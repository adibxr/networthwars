<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eeshit Mishra - Coming Soon</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #f4f4f4, #e0e0e0);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #333;
    }

    .glass-box {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px 60px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 90%;
      animation: fadeIn 1.5s ease;
    }

    .glass-box h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .glass-box p {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .social-links a {
      text-decoration: none;
      color: #333;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }

    .social-links a:hover {
      color: #0073e6;
    }

    .join-button {
      display: inline-block;
      margin: 20px auto;
      padding: 12px 24px;
      background-color: #0073e6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s;
    }

    .join-button:hover {
      background-color: #005bb5;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }

    footer a {
      color: #0073e6;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="glass-box">
    <h1>This Website is Managed by EESHIT MISHRA</h1>
    <p>We are launching something special soon!</p>
    <div class="social-links">
      <a href="mailto:admin@networthwars.com"><i class="fas fa-envelope"></i> Gmail</a>
      <a href="https://instagram.com/eeshitmishra" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://www.linkedin.com/in/eeshitmishra/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
    </div>
    <a class="join-button" href="https://hack.networthwars.com" target="_blank">JOIN NOW</a>
    <footer>
      Developed by <a href="https://adi.immortaladi.live" target="_blank">Adi</a>
    </footer>
  </div>
</body>

</html>
